<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3table - Number Search</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
            min-height: 100vh;
        }
        .container { max-width: 100%; margin: 0 auto; }
        h1 { font-size: 22px; margin-bottom: 12px; text-align: center; color: #fff; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .search-row { display: flex; gap: 8px; }
        #searchInput {
            flex: 1; padding: 12px; background-color: #2a2a2a;
            border: 1px solid #444; border-radius: 6px;
            color: #e0e0e0; font-size: 18px;
        }
        #searchInput::placeholder { color: #888; }
        #searchInput:focus { outline: none; border-color: #0066cc; background-color: #333; }
        .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
        button {
            padding: 10px 14px; background-color: #0066cc; color: #fff;
            border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer; flex: 1;
        }
        button:active { background-color: #0052a3; }
        button.add-col { background-color: #28a745; }
        button.clear { background-color: #dc3545; }
        #fileInput { display: none; }
        .table-wrapper { overflow-x: auto; border-radius: 6px; border: 1px solid #444; }
        table { border-collapse: collapse; background-color: #242424; }
        th {
            background-color: #cc0000; padding: 10px 6px; text-align: center;
            font-weight: 700; border: 1px solid #555; color: #fff; font-size: 13px;
            min-width: 55px; position: sticky; top: 0;
        }
        th.row-header { background-color: #cc0000; min-width: 35px; }
        td {
            padding: 8px 4px; text-align: center; border: 1px solid #444;
            font-size: 15px; font-weight: 500; min-width: 55px;
            font-family: 'Courier New', monospace;
        }
        td.row-num { background-color: #cc0000; color: #fff; font-weight: 700; min-width: 35px; }
        td.no-match { color: #555; }
        td.filtered {
            letter-spacing: 2px; font-size: 16px; font-weight: 700;
            color: #00ff00; background-color: #002200;
        }
        .status { text-align: center; color: #0066cc; font-size: 13px; margin-top: 8px; min-height: 20px; }
        .info-text { text-align: center; color: #888; font-size: 12px; margin-top: 10px; }
        .paste-area {
            width: 100%; padding: 10px; background: #2a2a2a; border: 1px dashed #555;
            border-radius: 6px; color: #e0e0e0; font-size: 14px; min-height: 60px;
            margin-bottom: 10px; resize: vertical;
        }
        .paste-area::placeholder { color: #666; }
        .search-help {
            color: #999; font-size: 11px; margin-top: 2px; line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>3table</h1>
        <div class="controls">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="0-9 / $12 / 1$2 / 12$ / 12" maxlength="3">
            </div>
            <div class="search-help">
                0-9: diff group | $12: H hidden | 1$2: M hidden | 12$: U hidden | 12: pair
            </div>
            <div class="button-row">
                <button id="uploadBtn">📸 Upload</button>
                <button id="pasteBtn">📋 Paste</button>
                <button class="add-col" id="addColBtn">+ Column</button>
                <button class="clear" id="clearBtn">🗑️ Clear</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div id="pasteArea" style="display:none;">
            <textarea class="paste-area" id="pasteInput" placeholder="Paste 3-digit numbers here (one per line, or space/comma separated). Column by column fill."></textarea>
            <button id="pasteConfirmBtn" style="margin-top:6px;">✓ Import</button>
        </div>

        <div class="table-wrapper">
            <table id="dataTable">
                <thead><tr id="headerRow"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="info-text">Upload photo or paste numbers. Use $ as wildcard for hidden digit.</div>
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <script>
        const STORAGE_KEY = 'table_data_v2';
        const COLS_KEY = 'table_cols';
        const ROWS = 24;
        let tableData = [];
        let numCols = 5;

        function init() {
            loadData();
            renderTable();
            setupEventListeners();
        }

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            const storedCols = localStorage.getItem(COLS_KEY);
            if (stored) {
                tableData = JSON.parse(stored);
            } else {
                tableData = Array.from({length: ROWS}, () => Array(numCols).fill(''));
            }
            if (storedCols) numCols = parseInt(storedCols);
            else numCols = tableData[0] ? tableData[0].length : 5;
            for (let r = 0; r < ROWS; r++) {
                if (!tableData[r]) tableData[r] = Array(numCols).fill('');
                while (tableData[r].length < numCols) tableData[r].push('');
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tableData));
            localStorage.setItem(COLS_KEY, String(numCols));
        }

        // Digit difference groups (for single digit 0-9 search)
        const digitGroups = {
            '0': ['01','10','12','21','23','32','34','43','45','54','56','65','67','76','78','87','89','98','90','09'],
            '1': ['02','20','13','31','24','42','35','53','46','64','57','75','68','86','79','97','80','08'],
            '2': ['03','30','14','41','25','52','36','63','47','74','58','85','69','96','70','07'],
            '3': ['04','40','15','51','26','62','37','73','48','84','59','95','60','06'],
            '4': ['05','50','16','61','27','72','38','83','49','94'],
            '5': ['06','60','17','71','28','82','39','93','40','04'],
            '6': ['07','70','18','81','29','92','30','03'],
            '7': ['08','80','19','91','20','02'],
            '8': ['09','90','10','01'],
            '9': ['09','90']
        };

        // ============ SEARCH LOGIC ============
        function parseSearch(searchTerm) {
            if (!searchTerm) return null;

            // Single digit 0-9: digit difference group
            // Middle digit hidden, show H _ U
            if (/^[0-9]$/.test(searchTerm)) {
                return {
                    type: 'digit_diff',
                    matches: function(numStr) {
                        const h = numStr[0], u = numStr[2];
                        const pair = h + u;
                        const rev = u + h;
                        const group = digitGroups[searchTerm] || [];
                        return group.includes(pair) || group.includes(rev);
                    },
                    format: function(numStr) {
                        return numStr[0] + ' ' + numStr[2];
                    }
                };
            }

            // $XY pattern: hundreds digit hidden, match middle=X, units=Y
            // Display: show middle + units (2 digits)
            if (/^\$[0-9]{2}$/.test(searchTerm)) {
                const m = searchTerm[1], u = searchTerm[2];
                return {
                    type: 'dollar_first',
                    matches: function(numStr) {
                        return numStr[1] === m && numStr[2] === u;
                    },
                    format: function(numStr) {
                        return numStr[1] + numStr[2];
                    }
                };
            }

            // X$Y pattern: middle digit hidden, match hundreds=X, units=Y
            // Display: hundreds + space + units
            if (/^[0-9]\$[0-9]$/.test(searchTerm)) {
                const h = searchTerm[0], u = searchTerm[2];
                return {
                    type: 'dollar_middle',
                    matches: function(numStr) {
                        return numStr[0] === h && numStr[2] === u;
                    },
                    format: function(numStr) {
                        return numStr[0] + ' ' + numStr[2];
                    }
                };
            }

            // XY$ pattern: units digit hidden, match hundreds=X, middle=Y
            // Display: hundreds + middle (2 digits)
            if (/^[0-9]{2}\$$/.test(searchTerm)) {
                const h = searchTerm[0], m = searchTerm[1];
                return {
                    type: 'dollar_last',
                    matches: function(numStr) {
                        return numStr[0] === h && numStr[1] === m;
                    },
                    format: function(numStr) {
                        return numStr[0] + numStr[1];
                    }
                };
            }

            // Two digits (no $): match hundreds=first digit, units=second digit
            // Middle digit hidden, show H _ U
            if (/^[0-9]{2}$/.test(searchTerm)) {
                const h = searchTerm[0], u = searchTerm[1];
                return {
                    type: 'two_digit',
                    matches: function(numStr) {
                        return numStr[0] === h && numStr[2] === u;
                    },
                    format: function(numStr) {
                        return numStr[0] + ' ' + numStr[2];
                    }
                };
            }

            return null;
        }

        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const searchObj = parseSearch(searchTerm);
            const headerRow = document.getElementById('headerRow');
            const tableBody = document.getElementById('tableBody');

            // Header
            headerRow.innerHTML = '<th class="row-header">No.</th>';
            for (let c = 0; c < numCols; c++) {
                const th = document.createElement('th');
                th.textContent = String(22 + c);
                headerRow.appendChild(th);
            }

            // Body
            tableBody.innerHTML = '';
            let matchCount = 0;

            for (let r = 0; r < ROWS; r++) {
                const tr = document.createElement('tr');
                const tdNum = document.createElement('td');
                tdNum.className = 'row-num';
                tdNum.textContent = r + 1;
                tr.appendChild(tdNum);

                for (let c = 0; c < numCols; c++) {
                    const td = document.createElement('td');
                    const val = tableData[r][c] || '';

                    if (searchObj && val) {
                        const numStr = String(val).padStart(3, '0');
                        if (searchObj.matches(numStr)) {
                            td.className = 'filtered';
                            td.textContent = searchObj.format(numStr);
                            matchCount++;
                        } else {
                            td.className = 'no-match';
                            td.textContent = numStr;
                        }
                    } else if (val) {
                        td.textContent = String(val).padStart(3, '0');
                    } else {
                        td.textContent = '';
                    }

                    td.addEventListener('click', () => editCell(r, c, td));
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            }

            // Status
            const statusEl = document.getElementById('status');
            if (searchObj) {
                statusEl.textContent = `Found: ${matchCount} matches`;
            } else if (searchTerm && !searchObj) {
                statusEl.textContent = 'Invalid search format';
            } else {
                const total = tableData.flat().filter(v => v).length;
                statusEl.textContent = total > 0 ? `Total: ${total} numbers` : '';
            }
        }

        function editCell(row, col, td) {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (searchTerm) return;

            const currentVal = tableData[row][col] || '';
            const input = document.createElement('input');
            input.type = 'tel';
            input.maxLength = 3;
            input.value = currentVal ? String(currentVal).padStart(3, '0') : '';
            input.style.cssText = 'width:100%;padding:6px;background:#1a1a1a;border:1px solid #0066cc;border-radius:4px;color:#00ff00;text-align:center;font-size:16px;font-family:monospace;';

            td.innerHTML = '';
            td.appendChild(input);
            input.focus();
            input.select();

            const finish = () => {
                const val = input.value.trim();
                if (val === '') {
                    tableData[row][col] = '';
                } else if (/^\d{1,3}$/.test(val)) {
                    tableData[row][col] = val.padStart(3, '0');
                }
                saveData();
                renderTable();
            };

            input.addEventListener('blur', finish);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { input.blur(); }
                if (e.key === 'Escape') { renderTable(); }
            });
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                // Allow digits and $ symbol, max 3 chars
                let val = e.target.value;
                val = val.replace(/[^0-9$]/g, '');
                if (val.length > 3) val = val.substring(0, 3);
                e.target.value = val;
                renderTable();
            });

            document.getElementById('uploadBtn').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });

            document.getElementById('fileInput').addEventListener('change', handleFileUpload);

            document.getElementById('pasteBtn').addEventListener('click', () => {
                const area = document.getElementById('pasteArea');
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
            });

            document.getElementById('pasteConfirmBtn').addEventListener('click', handlePaste);

            document.getElementById('addColBtn').addEventListener('click', () => {
                numCols++;
                for (let r = 0; r < ROWS; r++) {
                    if (!tableData[r]) tableData[r] = [];
                    while (tableData[r].length < numCols) tableData[r].push('');
                }
                saveData();
                renderTable();
            });

            document.getElementById('clearBtn').addEventListener('click', () => {
                if (confirm('Clear all data?')) {
                    tableData = Array.from({length: ROWS}, () => Array(numCols).fill(''));
                    saveData();
                    document.getElementById('searchInput').value = '';
                    renderTable();
                }
            });
        }

        function handlePaste() {
            const text = document.getElementById('pasteInput').value.trim();
            if (!text) return;

            const numbers = text.match(/\d{3}/g) || [];
            if (numbers.length === 0) {
                document.getElementById('status').textContent = 'No 3-digit numbers found.';
                return;
            }

            // Fill column by column (24 rows per column)
            let row = 0, col = 0;
            for (const num of numbers) {
                if (col >= numCols) {
                    numCols++;
                    for (let r = 0; r < ROWS; r++) tableData[r].push('');
                }
                tableData[row][col] = num;
                row++;
                if (row >= ROWS) { row = 0; col++; }
            }

            saveData();
            renderTable();
            document.getElementById('pasteInput').value = '';
            document.getElementById('pasteArea').style.display = 'none';
            document.getElementById('status').textContent = `Imported ${numbers.length} numbers!`;
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Processing image... (may take 10-30 seconds)';

            try {
                const worker = await Tesseract.createWorker();
                const result = await worker.recognize(file);
                await worker.terminate();

                const text = result.data.text;
                const numbers = text.match(/\d{3}/g) || [];

                if (numbers.length === 0) {
                    statusEl.textContent = 'No 3-digit numbers found. Try paste instead.';
                    return;
                }

                // Fill column by column
                let row = 0, col = 0;
                for (const num of numbers) {
                    if (col >= numCols) {
                        numCols++;
                        for (let r = 0; r < ROWS; r++) tableData[r].push('');
                    }
                    tableData[row][col] = num;
                    row++;
                    if (row >= ROWS) { row = 0; col++; }
                }

                saveData();
                renderTable();
                statusEl.textContent = `Imported ${numbers.length} numbers from image!`;
                document.getElementById('fileInput').value = '';
            } catch (error) {
                statusEl.textContent = 'Error processing image. Try paste instead.';
                console.error('OCR error:', error);
            }
        }

        init();
    </script>
</body>
</html>
